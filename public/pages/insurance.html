<div>
  <div class="card">
    <h2>🛡️ Insurance Coverage</h2>
    <p class="stat-label">Track your insurance policies, identify gaps, and log decisions.</p>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3>Current Coverage</h3>
      <button class="btn" onclick="openAddInsuranceModal()">+ Add Policy</button>
    </div>
    <div class="table-container">
      <table>
        <thead><tr><th>Type</th><th>Provider</th><th>Coverage</th><th>Premium</th><th>Status</th></tr></thead>
        <tbody id="insurance-table-page"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h3>📜 Insurance Decision Log</h3>
    <div id="insurance-decisions" class="table-container" style="margin-top:16px"></div>
  </div>
</div>

<script>
async function initInsurance(slug) {
  renderInsurance(slug);
}

async function renderInsurance(slug) {
  const family = await API.get(`/api/families/${slug}`);

  const tbody = document.getElementById('insurance-table-page');
  if (family.data.insurance?.length) {
    tbody.innerHTML = family.data.insurance.map(i => `
      <tr>
        <td><strong>${i.type}</strong></td>
        <td>${i.provider || '-'}</td>
        <td>${i.coverage || '-'}</td>
        <td>${i.premium || '-'}</td>
        <td>${statusBadge(i.status)}</td>
      </tr>
    `).join('');
  } else {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No insurance policies yet</td></tr>';
  }

  // Decision log (rendered from seed data if exists)
  const decDiv = document.getElementById('insurance-decisions');
  if (family.data.insurance_decisions?.length) {
    decDiv.innerHTML = '<table><thead><tr><th>Provider</th><th>Policy</th><th>Decision</th><th>Premium</th><th>Rationale</th></tr></thead><tbody>' +
      family.data.insurance_decisions.map(d => `
        <tr><td>${d.provider || '-'}</td><td>${d.policy_type || '-'}</td><td>${statusBadge(d.decision)}</td><td>${d.premium || '-'}</td><td>${d.rationale || '-'}</td></tr>
      `).join('') + '</tbody></table>';
  } else {
    decDiv.innerHTML = '<div class="empty-state"><p>No insurance decisions logged yet.</p></div>';
  }
}

function openAddInsuranceModal() {
  const html = `
    <div class="form-group"><label>Type</label><input id="i-type" required></div>
    <div class="form-group"><label>Provider</label><input id="i-provider"></div>
    <div class="form-group"><label>Coverage</label><input id="i-coverage"></div>
    <div class="form-group"><label>Premium</label><input id="i-premium"></div>
    <div class="form-group"><label>Status</label>
      <select id="i-status"><option>Active</option><option>Gap identified</option><option>Pending</option><option>Declined</option></select>
    </div>
  `;
  openModal('Add Insurance Policy', html, async () => {
    await API.post(`/api/families/${Router.familySlug}/insurance`, {
      type: document.getElementById('i-type').value,
      provider: document.getElementById('i-provider').value,
      coverage: document.getElementById('i-coverage').value,
      premium: document.getElementById('i-premium').value,
      status: document.getElementById('i-status').value
    });
    renderInsurance(Router.familySlug);
  });
}
</script>
