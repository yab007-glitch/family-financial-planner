<div>
  <div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <h2>🏁 Milestones</h2>
    <button class="btn" onclick="openAddMilestoneModal()">+ Add Milestone</button>
  </div>

  <div class="card">
    <div class="table-container">
      <table>
        <thead><tr><th>Milestone</th><th>Target Date</th><th>Status</th><th>Celebration Plan</th></tr></thead>
        <tbody id="milestones-table"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
async function initMilestones(slug) {
  renderMilestones(slug);
}

async function renderMilestones(slug) {
  const res = await API.get(`/api/families/${slug}/milestones`);
  const tbody = document.getElementById('milestones-table');
  if (!res.data?.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No milestones yet</td></tr>';
    return;
  }
  tbody.innerHTML = res.data.map(m => `
    <tr>
      <td><strong>${m.name}</strong></td>
      <td>${m.target_date || '-'}</td>
      <td>${statusBadge(m.status)}</td>
      <td>${m.celebration_plan || '-'}</td>
    </tr>
  `).join('');
}

function openAddMilestoneModal() {
  const html = `
    <div class="form-group"><label>Milestone Name</label><input id="ms-name" required></div>
    <div class="form-group"><label>Target Date</label><input id="ms-date" type="date"></div>
    <div class="form-group"><label>Celebration Plan</label><textarea id="ms-plan" rows="2"></textarea></div>
  `;
  openModal('Add Milestone', html, async () => {
    await API.post(`/api/families/${Router.familySlug}/milestones`, {
      name: document.getElementById('ms-name').value,
      target_date: document.getElementById('ms-date').value,
      celebration_plan: document.getElementById('ms-plan').value
    });
    renderMilestones(Router.familySlug);
  });
}
</script>
