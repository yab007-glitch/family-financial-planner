<div>
  <div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <h2>👨‍👩‍👧‍👦 Family Members</h2>
    <button class="btn" onclick="openAddMemberModal()">+ Add Member</button>
  </div>

  <div class="card">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Age</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="family-table"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
async function initFamily(slug) {
  renderMembers(slug);
}

async function renderMembers(slug) {
  const res = await API.get(`/api/families/${slug}/members`);
  const tbody = document.getElementById('family-table');
  if (!res.data?.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No family members yet</td></tr>';
    return;
  }
  tbody.innerHTML = res.data.map(m => `
    <tr>
      <td><strong>${m.name}</strong></td>
      <td>${m.role || '-'}</td>
      <td>${m.age || '-'}</td>
      <td>${m.notes || '-'}</td>
    </tr>
  `).join('');
}

function openAddMemberModal() {
  const html = `
    <div class="form-group"><label>Name</label><input id="m-name" required></div>
    <div class="form-group"><label>Role</label><input id="m-role" placeholder="e.g. Primary Income"></div>
    <div class="form-group"><label>Age</label><input id="m-age" type="number"></div>
    <div class="form-group"><label>Notes</label><textarea id="m-notes" rows="2"></textarea></div>
  `;
  openModal('Add Family Member', html, async () => {
    await API.post(`/api/families/${Router.familySlug}/members`, {
      name: document.getElementById('m-name').value,
      role: document.getElementById('m-role').value,
      age: document.getElementById('m-age').value,
      notes: document.getElementById('m-notes').value
    });
    renderMembers(Router.familySlug);
  });
}
</script>
